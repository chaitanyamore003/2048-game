<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">

    <!-- Title -->
    <h1 class="title">2048</h1>

    <hr class="divider">

    <!-- Controls Row -->
    <div class="controls">
        <div class="score-box">
            <span>Score</span>
            <h2 id="score">0</h2>
        </div>

        <div class="score-box">
            <span>Best</span>
            <h2 id="best-score">0</h2>
        </div>

        <button id="new-game">New Game</button>
    </div>

    <!-- Board -->
    <div id="board"></div>

    <!-- Footer -->
    <p class="credit">Coded by Chaitanya More</p>

</div>

<script src="index.js"></script>
</body>
</html>
